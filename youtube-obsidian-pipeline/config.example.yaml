# Copy this file to config.yaml and fill in your own values.
# Do NOT commit config.yaml to git (it can contain tokens).

youtube:
  # Used by fetch_playlist.py for playlist polling. subtitle_languages is
  # also used by pipeline.py for any yt-dlp-based subtitle download
  # (YouTube videos and other sites yt-dlp can extract captions from).
  playlist_id: "PLU_BTwYWjQm8"   # the private playlist you add videos to
  client_id_op_ref: "op://vault/item/client_id"        # 1Password field reference
  client_secret_op_ref: "op://vault/item/client_secret"  # 1Password field reference
  token_file: "token.json"                     # created by youtube_auth.py on first run
  # language preference order for subtitle download, first available wins
  subtitle_languages: ["en"]

transcription:
  # Local speech-to-text fallback (Parakeet via MLX), used whenever no
  # subtitles/captions are available: YouTube videos with captions off,
  # generic links, and local media files without a same-name .srt sidecar.
  # Read by pipeline.py (to pick the model) and by host_bridge.py's
  # transcribe_backend.py (which actually runs it) - REQUIRES AN APPLE
  # SILICON MAC, MLX doesn't run on Linux, Windows, or Intel Macs, which
  # is why host_bridge.py has to run natively rather than in a container.
  # This is a Hugging Face model repo id; it's downloaded once and cached
  # locally, every run after that is fully offline.
  model: "mlx-community/parakeet-tdt-0.6b-v3"

bridge:
  # host_bridge.py's own address and auth, as seen by pipeline.py (which
  # may be running in a container). "http://host.docker.internal:8081" if
  # pipeline.py runs in Docker, "http://127.0.0.1:8081" if running
  # natively on the same Mac as host_bridge.py.
  url: "http://host.docker.internal:8081"
  port: 8081
  # A 1Password field reference to a random shared-secret token, separate
  # from webhook.auth_token_op_ref (different trust boundary - this one's
  # only reachable from the Docker network, not the public internet).
  # Generate with `openssl rand -hex 32`.
  auth_token_op_ref: "op://vault/item/bridge_token"

github:
  # Subtitles repo: where raw subtitle files get committed
  subtitles_repo_url: "https://github.com/s1nack-dev/youtube-subtitles.git"
  subtitles_repo_path: "./git/youtube-subtitles"     # local clone location on this server
  subtitles_branch: "main"
  subtitles_dir_in_repo: "subtitles"           # subfolder inside that repo

  # Obsidian vault repo: where the markdown note gets committed
  vault_repo_url: "https://github.com/s1nack-dev/ai-test-sandbox-obsidian.git"
  vault_repo_path: "./git/ai-test-sandbox-obsidian"             # local clone location on this server
  vault_branch: "main"
  vault_notes_dir: "YouTube Summaries"         # subfolder inside the vault repo

  # A GitHub Personal Access Token. Recommended: a fine-grained token
  # restricted to the two repos above with Contents: Read and write permission
  # only. Fetched from 1Password at runtime.
  token_op_ref: "op://vault/item/credential"

  commit_author_name: "youtube-pipeline-bot"
  commit_author_email: "youtube-pipeline-bot@users.noreply.github.com"

claude:
  # Path to the Claude Code CLI binary (must already be logged in via `claude login`
  # with your Pro/Max subscription so this runs headless without API billing).
  # Only read by host_bridge.py (which actually shells out to it) - not
  # used directly by pipeline.py/fetch_playlist.py/server.py anymore.
  command: "claude"

# How many times fetch_playlist.py retries a video that failed (transient
# network error, git push conflict, etc.) before giving up on it
# permanently and notifying you. Not used by pipeline.py's one-off CLI runs.
max_retries: 3

notifications:
  # Optional: any webhook that accepts {"text": "..."} JSON POSTs, e.g. a
  # Slack "Incoming Webhook" URL. Leave blank to disable.
  webhook_url: ""

  # Optional: email alerts via SMTP. Leave enabled: false to disable.
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "you@gmail.com"
    smtp_password_env_var: "SMTP_PASSWORD"   # read from env, not stored here
    from_addr: "you@gmail.com"
    to_addr: "you@gmail.com"

state_file: "state.json"

# Inter-process lock file - serializes process_input() calls across
# pipeline-server and pipeline-fetch containers to prevent races on shared
# state.json and git repos. Must be bind-mounted into containers if running
# containerized (see docker/docker-compose.yml).
lock_file: "pipeline.lock"

webhook:
  # Used only by server.py (webhook mode - triggering processing over the
  # network via a Cloudflare Tunnel). Not used by fetch_playlist.py or
  # pipeline.py's CLI.
  port: 8080
  # A 1Password field reference to a random shared-secret token. Callers
  # must send it as `Authorization: Bearer <token>`. Generate one with
  # `openssl rand -hex 32` and store it in 1Password - do not reuse any
  # other credential for this.
  auth_token_op_ref: "op://vault/item/webhook_token"
