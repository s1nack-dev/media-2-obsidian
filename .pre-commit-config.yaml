minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        name: Ruff (lint and fix)
        args: ["--fix"]
        files: ^youtube-obsidian-pipeline/.*\.py$
      - id: ruff-format
        name: Ruff (format)
        files: ^youtube-obsidian-pipeline/.*\.py$

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: Bandit (Python security)
        args: ["-ll", "-ii", "-c", "youtube-obsidian-pipeline/pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/semgrep/semgrep
    rev: v1.164.0
    hooks:
      - id: semgrep
        name: Semgrep (Python security audit)
        args: ["--config=p/python", "--config=p/security-audit", "--error"]
        files: ^youtube-obsidian-pipeline/.*\.py$
        stages: [pre-push]

  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (locked dependencies)
        language: python
        additional_dependencies: ["pip-audit==2.10.1"]
        entry: >-
          bash -c 'uv export --project youtube-obsidian-pipeline --frozen
          --no-dev --no-emit-project --format requirements-txt |
          pip-audit --strict -r /dev/stdin'
        files: ^youtube-obsidian-pipeline/(pyproject\.toml|uv\.lock)$
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: Pytest (unit tests)
        entry: uv run --project youtube-obsidian-pipeline --extra test pytest -q
        language: system
        files: ^youtube-obsidian-pipeline/(.*\.py|pyproject\.toml|uv\.lock)$
        pass_filenames: false

      - id: hadolint
        name: Hadolint (Dockerfile lint)
        language: docker_image
        entry: ghcr.io/hadolint/hadolint:v2.14.0 hadolint
        types: [dockerfile]

      - id: trivy-docker
        name: Trivy (Docker configuration scan)
        language: docker_image
        entry: >-
          aquasec/trivy:0.70.0 config --config /src/trivy.yaml
          --ignorefile /src/.trivyignore --cache-dir /tmp/trivy-cache
          --skip-version-check /src/youtube-obsidian-pipeline
        files: ^youtube-obsidian-pipeline/(Dockerfile|docker/.*\.ya?ml)$
        pass_filenames: false

      - id: trivy-fs
        name: Trivy (dependencies and secrets)
        language: docker_image
        entry: >-
          aquasec/trivy:0.70.0 fs --config /src/trivy.yaml
          --scanners vuln,secret --cache-dir /tmp/trivy-cache
          --skip-version-check /src/youtube-obsidian-pipeline
        files: ^youtube-obsidian-pipeline/(.*\.py|pyproject\.toml|uv\.lock|Dockerfile)$
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (staged files)
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(\.secrets\.baseline|youtube-obsidian-pipeline/uv\.lock)$

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.95.0
    hooks:
      - id: trufflehog
        name: TruffleHog (offline Git change scan)
        entry: >-
          trufflehog git file://. --since-commit HEAD
          --results=unknown,unverified --fail --no-verification
          --trust-local-git-config
        stages: [pre-push]
